<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volumetric God Ray Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #0b0a12;
  }

  /* ============================================================
     The whole upper region IS the ray fan: one hand-authored
     conic-gradient centered on the top-left corner, with
     irregular stops — wide beams, thin streaks, one big dark
     wedge — instead of a uniform repeating pattern.

     Conic angle map (center = top-left corner, 0° = up, CW):
       90°  = along the top edge
       180° = along the left edge
     ============================================================ */
  .scene {
    position: relative;
    width: min(88vmin, 640px);
    aspect-ratio: 1 / 1;
    border-radius: 28px;
    overflow: hidden;
    isolation: isolate;

    /* base: vertical fall-off into dark navy */
    background:
      linear-gradient(
        178deg,
        #5230df 0%,
        #4b2cd6 14%,
        #3d28b0 30%,
        #2f2478 46%,
        #262147 64%,
        #211e38 82%,
        #1e1c31 100%
      );
  }

  /* ---------- THE RAY FAN ---------- */
  /* Two stacked copies of the same irregular fan; they rotate and
     fade slightly out of phase so the beams drift organically. */
  .fan {
    position: absolute;
    z-index: 2;
    width: 340%;
    height: 340%;
    top: -170%;
    left: -170%;
    transform-origin: 50% 50%;   /* the top-left corner of the square */
    pointer-events: none;
    filter: blur(18px);

    /* Irregular, hand-placed wedges — this is the whole picture:
       bright beams and dark shafts of very different widths.     */
    background: conic-gradient(from 0deg at 50% 50%,
      transparent                 0deg,
      transparent                88deg,

      /* along the top edge: bright */
      rgba(124,  92, 252, 0.55)  90deg,
      rgba(118,  86, 250, 0.55)  94deg,

      /* thin dark streak just under the top edge */
      rgba( 22,  16,  54, 0.42)  97deg,

      /* WIDE bright beam sweeping across the upper area */
      rgba(126,  94, 255, 0.50) 101deg,
      rgba(120,  88, 250, 0.48) 108deg,

      /* thin dark streak */
      rgba( 20,  15,  52, 0.45) 111.5deg,

      /* medium bright beam */
      rgba(110,  80, 244, 0.42) 115deg,
      rgba(100,  72, 235, 0.36) 120deg,

      /* THE BIG DARK WEDGE — the wide diagonal shadow that runs
         from the corner down toward the middle-left            */
      rgba( 18,  14,  48, 0.50) 126deg,
      rgba( 16,  12,  44, 0.55) 138deg,

      /* faint recovery beam inside the dark zone */
      rgba( 90,  64, 220, 0.20) 145deg,

      /* long soft haze falling down the left side */
      rgba( 70,  50, 190, 0.16) 154deg,
      rgba( 30,  22,  80, 0.28) 164deg,

      /* near the left edge: lifted slightly by the aura */
      rgba( 80,  60, 205, 0.18) 173deg,
      rgba( 80,  60, 205, 0.14) 179deg,
      transparent               181deg,
      transparent               360deg
    );

    /* beams stay strong far into the square, then dissolve —
       long rays, but they still die into the dark lower-right */
    -webkit-mask-image: radial-gradient(50% 50% at 50% 50%,
      rgba(0,0,0,1)    0%,
      rgba(0,0,0,0.95) 18%,
      rgba(0,0,0,0.70) 30%,
      rgba(0,0,0,0.30) 42%,
      rgba(0,0,0,0)    52%);
    mask-image: radial-gradient(50% 50% at 50% 50%,
      rgba(0,0,0,1)    0%,
      rgba(0,0,0,0.95) 18%,
      rgba(0,0,0,0.70) 30%,
      rgba(0,0,0,0.30) 42%,
      rgba(0,0,0,0)    52%);
  }

  /* rotation is driven by JS (requestAnimationFrame) so the
     movement is guaranteed and easy to tune — see script below */
  .fan--a { will-change: transform, opacity; }
  .fan--b {
    opacity: 0.5;
    filter: blur(26px);
    will-change: transform, opacity;
  }

  /* extra bloom right at the corner so the source feels hot */
  .scene::before {
    content: "";
    position: absolute;
    inset: -10%;
    z-index: 3;
    pointer-events: none;
    background:
      radial-gradient(55% 45% at 4% 2%,
        rgba(150, 120, 255, 0.40) 0%,
        rgba(115,  84, 248, 0.16) 34%,
        rgba( 90,  60, 230, 0.0)  60%);
  }

  /* ---------- EDGE AURA ---------- */
  .aura {
    position: absolute;
    inset: 0;
    z-index: 4;
    border-radius: inherit;
    pointer-events: none;
    box-shadow:
      inset 0 0 42px 6px rgba(168, 140, 255, 0.28),
      inset 0 0 14px 2px rgba(190, 165, 255, 0.22);
  }

  .aura::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background:
      linear-gradient(90deg,  rgba(172, 142, 255, 0.30) 0%, rgba(172,142,255,0) 9%),
      linear-gradient(180deg, rgba(172, 142, 255, 0.26) 0%, rgba(172,142,255,0) 9%),
      linear-gradient(270deg, rgba(150, 122, 240, 0.16) 0%, rgba(150,122,240,0) 7%),
      linear-gradient(0deg,   rgba(150, 122, 240, 0.12) 0%, rgba(150,122,240,0) 6%);
    filter: blur(8px);
  }

</style>
</head>
<body>

  <div class="scene">
    <div class="fan fan--a"></div>
    <div class="fan fan--b"></div>
    <div class="aura"></div>
  </div>

  <script>
    /* ---------------- RAY MOTION ----------------
       The two fan copies slowly sweep around the top-left corner,
       out of phase, so beams visibly drift, cross, and breathe.

       Tune here:
         SPEED  — overall pace (higher = faster)
         SWEEP_A / SWEEP_B — rotation range in degrees            */
    const SPEED   = 1.0;
    const SWEEP_A = 3.5;   // degrees each way for the sharp fan
    const SWEEP_B = 5.0;   // degrees each way for the soft fan

    const fanA = document.querySelector('.fan--a');
    const fanB = document.querySelector('.fan--b');

    let start = performance.now();

    function tick(now) {
      const t = (now - start) / 1000 * SPEED;

      // layered sines = organic, non-looping-looking sweep
      const a = Math.sin(t * 0.22) * SWEEP_A
              + Math.sin(t * 0.071 + 1.3) * (SWEEP_A * 0.4);

      const b = Math.sin(t * 0.16 + 2.1) * -SWEEP_B
              + Math.sin(t * 0.053) * (SWEEP_B * 0.35);

      fanA.style.transform = `rotate(${a.toFixed(3)}deg)`;
      fanB.style.transform = `rotate(${b.toFixed(3)}deg)`;

      // gentle breathing on the soft layer
      fanB.style.opacity = (0.5 + Math.sin(t * 0.19) * 0.14).toFixed(3);

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>

</body>
</html>
